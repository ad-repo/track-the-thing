[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --tb=short
    --strict-markers
    --disable-warnings
    --timeout=5
markers =
    unit: Unit tests
    integration: Integration tests
    migration: Migration tests
    slow: Slow running tests
asyncio_mode = auto

